<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: Inter, sans-serif; margin: 16px; font-size: 13px; color: #333; }
  #status { margin-bottom: 8px; color: #555; }
  #bar-wrap { background: #eee; border-radius: 4px; height: 8px; overflow: hidden; margin-bottom: 8px; }
  #bar { background: #3DBCCC; height: 100%; width: 0%; transition: width 0.3s; }
  #log { font-size: 11px; color: #888; max-height: 60px; overflow-y: auto; }
</style>
</head>
<body>
  <div id="status">Starting...</div>
  <div id="bar-wrap"><div id="bar"></div></div>
  <div id="log"></div>

<script>
const status = document.getElementById('status');
const bar = document.getElementById('bar');
const log = document.getElementById('log');

function addLog(msg) {
  const line = document.createElement('div');
  line.textContent = msg;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

onmessage = async (e) => {
  const msg = e.data.pluginMessage;
  if (!msg) return;

  if (msg.type === 'decode') {
    const screens = msg.screens;
    status.textContent = `Loading ${screens.length} screens...`;

    for (let i = 0; i < screens.length; i++) {
      const { index, label, data } = screens[i];
      status.textContent = `Loading ${i + 1}/${screens.length}: ${label}`;
      addLog(`Decoding: ${label}`);

      try {
        // fetch() supports data: URLs natively in browser
        const res = await fetch(data);
        const buf = await res.arrayBuffer();
        // Convert to plain array for serialization to main thread
        const bytes = Array.from(new Uint8Array(buf));
        parent.postMessage({ pluginMessage: { type: 'imageBytes', index, bytes } }, '*');
        addLog(`✓ Done: ${label}`);
      } catch (err) {
        addLog(`✗ Error: ${label} — ${err.message}`);
        parent.postMessage({ pluginMessage: { type: 'error', index, msg: err.message } }, '*');
      }
    }
  }

  if (msg.type === 'progress') {
    const pct = Math.round((msg.done / msg.total) * 100);
    bar.style.width = pct + '%';
    status.textContent = `Applied ${msg.done}/${msg.total} screens`;
  }

  if (msg.type === 'error') {
    addLog(`✗ Failed: ${msg.label} — ${msg.msg}`);
  }
};
</script>
</body>
</html>
